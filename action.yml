name: 'Deploy Ghost Theme'
description: 'Package and upload a theme to your Ghost site'
branding:
  icon: 'cloud-lightning'
  color: 'gray-dark'
inputs:
  api-url:
    description: 'Ghost Admin API Url'
    required: true
  api-key:
    description: 'Ghost Admin API Key'
    required: true
  version:
    description: 'Minimum Ghost Admin API version'
    required: false
    default: 'v6.0'
  exclude:
    description: 'Files or folders to exclude (space-separated list)'
    required: false
  theme-name:
    description: 'A filename-safe custom theme name that overrides the default name in package.json'
    required: false
  file:
    description: 'Workspace-contained path to a built zip file, resolved from `working-directory`. If set, `exclude` and `theme-name` are ignored'
    required: false
  working-directory:
    description: 'A workspace-contained directory to zip when a theme is in a subdirectory'
    required: false
runs:
  using: 'node24'
  main: 'dist/index.js'
